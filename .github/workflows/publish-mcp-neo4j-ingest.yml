name: Publish mcp-neo4j-ingest to PyPI

on:
  push:
    tags:
      - "mcp-neo4j-ingest-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mcp-neo4j-ingest/
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build
        working-directory: mcp-neo4j-ingest

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
        working-directory: mcp-neo4j-ingest
